<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>クロロ＝ルシルフル — 幻影旅団 団長</title>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          chara: { primary: '#7c3aed', accent: '#a78bfa', dark: '#0a0a0a', card: '#141414' },
        },
        fontFamily: { jp: ['"Noto Serif JP"', 'serif'] },
        animation: {
          'fade-in': 'fadeIn 0.8s ease forwards',
          'slide-up': 'slideUp 0.7s ease forwards',
          'float': 'float 3s ease-in-out infinite',
        },
        keyframes: {
          fadeIn: { from: { opacity: 0 }, to: { opacity: 1 } },
          slideUp: { from: { opacity: 0, transform: 'translateY(32px)' }, to: { opacity: 1, transform: 'translateY(0)' } },
          float: { '0%,100%': { transform: 'translateY(0)' }, '50%': { transform: 'translateY(-10px)' } },
        },
      }
    }
  }
</script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;700;900&display=swap" rel="stylesheet">
<style>
  body { background-color: #0a0a0a; }
  .gradient-text {
    background: linear-gradient(135deg, #a78bfa, #7c3aed, #a78bfa);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    background-size: 200% auto; animation: shimmer 3s linear infinite;
  }
  @keyframes shimmer { to { background-position: 200% center; } }
  .chara-card {
    background: linear-gradient(145deg, #1a1a1a, #141414);
    border: 1px solid rgba(124,58,237,0.2);
    transition: all 0.3s ease;
  }
  .chara-card:hover {
    border-color: rgba(124,58,237,0.6);
    transform: translateY(-4px);
    box-shadow: 0 10px 40px rgba(124,58,237,0.2);
  }
  .suit-bg { position: fixed; inset: 0; overflow: hidden; pointer-events: none; z-index: 0; }
  .suit-item { position: absolute; font-size: 1.5rem; opacity: 0.03; color: #7c3aed; animation: driftDown linear infinite; }
  @keyframes driftDown { from { transform: translateY(-80px) rotate(0deg); } to { transform: translateY(110vh) rotate(360deg); } }
  .ability-bar { background: linear-gradient(90deg, #7c3aed, #a78bfa); }
  .progress-track { background: rgba(255,255,255,0.08); border-radius: 9999px; overflow: hidden; }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: #0a0a0a; }
  ::-webkit-scrollbar-thumb { background: #7c3aed; border-radius: 2px; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect } = React;

const QUOTES = [
  { ja: "制約と誓約…そして覚悟の差だ", en: "It's the difference in restrictions, vows... and resolve." },
  { ja: "盗む価値があるから盗むんだ", en: "I steal because it's worth stealing." },
  { ja: "幻影旅団（クモ）の頭として命じる", en: "I order this as the head of the Phantom Troupe." },
  { ja: "命令は一つ、全員生きて帰ること", en: "There is only one order: everyone comes back alive." },
  { ja: "奪うことが全てではない。だが全ての始まりだ", en: "Stealing isn't everything. But it's the beginning of everything." },
];

const STATS = [
  { label: "念能力", value: 100, icon: "✦" },
  { label: "戦闘力", value: 95, icon: "⚔" },
  { label: "知性", value: 100, icon: "◈" },
  { label: "スピード", value: 90, icon: "◇" },
  { label: "カリスマ", value: 100, icon: "★" },
];

const ABILITIES = [
  {
    name: "盗賊の極意（スキルハンター）",
    type: "特質系",
    desc: "他人の念能力を盗み、自分のものとして使用する特質系能力。本の形をした具現化物に盗んだ能力を封じ込め、ページを開くことで発動する。盗む条件は厳格で、相手の能力を実際に見る、質問に答えさせる、本の表紙の手形に手を合わせる、以上を1時間以内に行う必要がある。",
    color: "from-purple-700 to-purple-900",
    icon: "📖"
  },
  {
    name: "栞のテーマ（ダブルフェイス）",
    type: "特質系",
    desc: "スキルハンターの発展能力。栞を挟んだページの能力を本を閉じたまま使用可能にする。これにより両手が自由になり、盗んだ能力と自身の戦闘を同時に行える。スキルハンターの最大の弱点であった「本を開いた状態で右手に持つ」という制約を克服した。",
    color: "from-violet-700 to-violet-900",
    icon: "🔖"
  },
];

const PROFILE = [
  { label: "本名", value: "クロロ＝ルシルフル" },
  { label: "所属", value: "幻影旅団 団長（No.0）" },
  { label: "念の系統", value: "特質系" },
  { label: "誕生日", value: "不明" },
  { label: "血液型", value: "AB型" },
  { label: "身長", value: "177 cm" },
  { label: "体重", value: "68 kg" },
  { label: "出身", value: "流星街" },
  { label: "懸賞金", value: "A級首 約29億ジェニー" },
];

function SymbolBackground() {
  const symbols = ['✦','◈','◇','★','✧'];
  const items = Array.from({length:18},(_,i) => ({
    symbol: symbols[i%5],
    left: `${5 + i*5.5}%`,
    delay: `${(i * 1.1).toFixed(1)}s`,
    duration: `${10 + (i % 7) * 2}s`,
    size: `${1 + (i % 3) * 0.5}rem`,
  }));
  return (
    <div className="suit-bg">
      {items.map((item, i) => (
        <span key={i} className="suit-item" style={{
          left: item.left, top: '-80px', animationDelay: item.delay,
          animationDuration: item.duration, fontSize: item.size,
          color: i % 2 === 0 ? '#7c3aed' : '#a78bfa',
        }}>{item.symbol}</span>
      ))}
    </div>
  );
}

function StatBar({ label, value, icon, delay }) {
  const [width, setWidth] = useState(0);
  useEffect(() => { setTimeout(() => setWidth(value), delay); }, []);
  return (
    <div className="mb-4">
      <div className="flex justify-between items-center mb-1">
        <span className="text-sm text-gray-300 font-jp">{icon} {label}</span>
        <span className="text-sm font-bold" style={{color:'#a78bfa'}}>{value}</span>
      </div>
      <div className="progress-track h-2">
        <div className="ability-bar h-2 rounded-full transition-all duration-1000 ease-out" style={{width:`${width}%`}} />
      </div>
    </div>
  );
}

function QuoteCarousel() {
  const [idx, setIdx] = useState(0);
  const [visible, setVisible] = useState(true);
  const next = () => { setVisible(false); setTimeout(() => { setIdx(i => (i+1) % QUOTES.length); setVisible(true); }, 300); };
  const prev = () => { setVisible(false); setTimeout(() => { setIdx(i => (i-1+QUOTES.length) % QUOTES.length); setVisible(true); }, 300); };
  return (
    <div className="chara-card rounded-2xl p-8 text-center relative overflow-hidden">
      <div className="absolute top-4 left-6 text-6xl opacity-10 font-serif" style={{color:'#7c3aed'}}>"</div>
      <div className="absolute bottom-4 right-6 text-6xl opacity-10 font-serif rotate-180" style={{color:'#7c3aed'}}>"</div>
      <div className="transition-opacity duration-300 relative z-10" style={{opacity: visible ? 1 : 0}}>
        <p className="text-lg leading-relaxed text-gray-100 font-jp mb-4">{QUOTES[idx].ja}</p>
        <p className="text-sm text-gray-500 italic">{QUOTES[idx].en}</p>
      </div>
      <div className="flex justify-center gap-4 mt-6">
        <button onClick={prev} className="w-10 h-10 rounded-full border border-purple-700 text-purple-400 hover:bg-purple-900/30 transition-all flex items-center justify-center">‹</button>
        <div className="flex gap-1 items-center">
          {QUOTES.map((_,i) => (<button key={i} onClick={() => setIdx(i)} className={`w-2 h-2 rounded-full transition-all ${i===idx ? 'bg-purple-600 w-4' : 'bg-gray-600'}`} />))}
        </div>
        <button onClick={next} className="w-10 h-10 rounded-full border border-purple-700 text-purple-400 hover:bg-purple-900/30 transition-all flex items-center justify-center">›</button>
      </div>
    </div>
  );
}

function App() {
  const [activeTab, setActiveTab] = useState('profile');
  const tabs = [
    { id: 'profile', label: '✦ プロフィール' },
    { id: 'abilities', label: '◈ 能力' },
    { id: 'stats', label: '◇ ステータス' },
    { id: 'quotes', label: '★ 名言' },
  ];

  return (
    <div className="min-h-screen text-white font-jp relative" style={{background:'#0a0a0a'}}>
      <SymbolBackground />

      {/* Back link */}
      <div className="relative z-10 max-w-4xl mx-auto px-6 pt-4">
        <a href="/" className="text-sm text-gray-500 hover:text-purple-400 transition-colors">← トップページへ戻る</a>
      </div>

      {/* Hero */}
      <div className="relative z-10 overflow-hidden" style={{background:'linear-gradient(180deg, #0d0520 0%, #0a0a0a 100%)'}}>
        <div className="absolute inset-0" style={{background:'radial-gradient(ellipse at 50% 0%, rgba(124,58,237,0.15) 0%, transparent 60%)'}} />
        <div className="max-w-4xl mx-auto px-6 py-20 text-center relative">
          <div className="flex justify-center gap-8 mb-8 text-2xl opacity-40">
            {['✦','◈','◇','★'].map((s,i) => (
              <span key={i} style={{color: i%2===0 ? '#7c3aed' : '#a78bfa', animationDelay:`${i*0.2}s`}}
                className="animate-float inline-block">{s}</span>
            ))}
          </div>
          <div className="inline-block mb-6 px-4 py-1 rounded-full border text-xs tracking-widest"
            style={{borderColor:'rgba(124,58,237,0.3)', color:'#a78bfa', background:'rgba(124,58,237,0.05)'}}>
            PHANTOM TROUPE — No.0
          </div>
          <h1 className="text-6xl md:text-8xl font-black mb-4 leading-none tracking-tight">
            <span className="gradient-text">CHROLLO</span>
          </h1>
          <p className="text-2xl text-gray-400 mb-2 font-light tracking-widest">クロロ＝ルシルフル</p>
          <p className="text-sm text-gray-600 tracking-widest">LUCILFER</p>
          <div className="flex justify-center gap-3 mt-8 flex-wrap">
            {['幻影旅団 団長', '特質系', 'No.0', '流星街出身'].map((tag,i) => (
              <span key={i} className="px-3 py-1 rounded-full text-xs border"
                style={{borderColor:'rgba(124,58,237,0.4)', color:'#c4b5fd', background:'rgba(124,58,237,0.08)'}}>
                {tag}
              </span>
            ))}
          </div>
        </div>
      </div>

      {/* Tabs */}
      <div className="relative z-10 sticky top-0" style={{background:'rgba(10,10,10,0.95)', backdropFilter:'blur(12px)', borderBottom:'1px solid rgba(255,255,255,0.06)'}}>
        <div className="max-w-4xl mx-auto px-6">
          <div className="flex gap-0 overflow-x-auto">
            {tabs.map(tab => (
              <button key={tab.id} onClick={() => setActiveTab(tab.id)}
                className={`px-5 py-4 text-sm font-bold whitespace-nowrap transition-all border-b-2 ${
                  activeTab === tab.id ? 'border-purple-600 text-purple-400' : 'border-transparent text-gray-500 hover:text-gray-300'
                }`}>{tab.label}</button>
            ))}
          </div>
        </div>
      </div>

      {/* Content */}
      <div className="relative z-10 max-w-4xl mx-auto px-6 py-12">
        {activeTab === 'profile' && (
          <div className="animate-fade-in grid md:grid-cols-2 gap-6">
            <div className="chara-card rounded-2xl p-6">
              <h2 className="text-lg font-bold mb-6 flex items-center gap-2" style={{color:'#a78bfa'}}>
                <span>✦</span> 基本プロフィール
              </h2>
              <div className="space-y-3">
                {PROFILE.map(({ label, value }) => (
                  <div key={label} className="flex justify-between items-center py-2" style={{borderBottom:'1px solid rgba(255,255,255,0.05)'}}>
                    <span className="text-xs text-gray-500 tracking-wider">{label}</span>
                    <span className="text-sm text-gray-200 font-medium">{value}</span>
                  </div>
                ))}
              </div>
            </div>
            <div className="space-y-5">
              <div className="chara-card rounded-2xl p-6">
                <h2 className="text-lg font-bold mb-4 flex items-center gap-2" style={{color:'#a78bfa'}}>
                  <span>◈</span> キャラクター概要
                </h2>
                <p className="text-sm text-gray-400 leading-relaxed">
                  クロロ＝ルシルフルは、A級賞金首の盗賊集団「幻影旅団（通称：クモ）」の団長。冷静沈着な性格の裏に激しい情熱を秘める。流星街出身で、幼少期に旅団を結成した。「盗賊の極意（スキルハンター）」により他者の念能力を奪い自在に操る。ヒソカとの天空闘技場での死闘は作中屈指の名勝負。
                </p>
              </div>
              <div className="chara-card rounded-2xl p-6" style={{background:'linear-gradient(135deg, rgba(124,58,237,0.1), rgba(167,139,250,0.05))'}}>
                <h2 className="text-sm font-bold mb-3 text-gray-400 tracking-widest">幻影旅団</h2>
                <p className="text-3xl font-black gradient-text">団長 No.0</p>
                <p className="text-xs text-gray-600 mt-1">13人の蜘蛛の頭</p>
              </div>
            </div>
          </div>
        )}

        {activeTab === 'abilities' && (
          <div className="animate-fade-in space-y-6">
            {ABILITIES.map((ab, i) => (
              <div key={i} className="chara-card rounded-2xl overflow-hidden">
                <div className={`bg-gradient-to-r ${ab.color} p-4 flex items-center gap-3`}>
                  <span className="text-2xl">{ab.icon}</span>
                  <div>
                    <h3 className="text-xl font-black">{ab.name}</h3>
                    <span className="text-xs opacity-75 tracking-wider">{ab.type}</span>
                  </div>
                </div>
                <div className="p-6">
                  <p className="text-gray-300 text-sm leading-relaxed">{ab.desc}</p>
                </div>
              </div>
            ))}
          </div>
        )}

        {activeTab === 'stats' && (
          <div className="animate-fade-in grid md:grid-cols-2 gap-6">
            <div className="chara-card rounded-2xl p-6">
              <h2 className="text-lg font-bold mb-6 flex items-center gap-2" style={{color:'#a78bfa'}}>
                <span>◇</span> 戦闘ステータス
              </h2>
              {STATS.map((s, i) => (<StatBar key={s.label} {...s} delay={i * 150} />))}
            </div>
            <div className="space-y-4">
              {[
                { label: '戦術指揮力', grade: 'EX', desc: '旅団全体を統率する類稀なるリーダーシップ', color: '#7c3aed' },
                { label: '能力収集数', grade: 'S+', desc: '数百もの念能力をスキルハンターに収集', color: '#a78bfa' },
                { label: '格闘技術', grade: 'S', desc: '素手でもA級賞金首に相応しい実力', color: '#7c3aed' },
                { label: '危険度', grade: 'EX', desc: 'ハンター協会が認定する最高レベルの脅威', color: '#8b5cf6' },
              ].map((item, i) => (
                <div key={i} className="chara-card rounded-xl p-4 flex items-center gap-4">
                  <div className="w-12 h-12 rounded-xl flex items-center justify-center font-black text-lg flex-shrink-0"
                    style={{background:`${item.color}22`, color:item.color, border:`1px solid ${item.color}44`}}>
                    {item.grade}
                  </div>
                  <div>
                    <p className="font-bold text-sm text-gray-200">{item.label}</p>
                    <p className="text-xs text-gray-500 mt-0.5">{item.desc}</p>
                  </div>
                </div>
              ))}
            </div>
          </div>
        )}

        {activeTab === 'quotes' && (
          <div className="animate-fade-in">
            <QuoteCarousel />
            <div className="mt-6 grid gap-4">
              {QUOTES.map((q, i) => (
                <div key={i} className="chara-card rounded-xl p-5">
                  <p className="text-gray-200 text-sm leading-relaxed font-jp">{q.ja}</p>
                </div>
              ))}
            </div>
          </div>
        )}
      </div>

      <footer className="relative z-10 text-center py-10 border-t" style={{borderColor:'rgba(255,255,255,0.05)'}}>
        <p className="text-2xl mb-2">✦ ◈ ◇ ★</p>
        <p className="text-xs text-gray-700">HUNTER × HUNTER © Yoshihiro Togashi / Shueisha</p>
        <p className="text-xs text-gray-800 mt-1">Fan-made tribute page</p>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
