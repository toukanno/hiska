<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ヒソカ＝モロウ — 奇術師</title>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          chara: { primary: '#be185d', accent: '#f9a8d4', dark: '#0a0a0a', card: '#141414' },
        },
        fontFamily: { jp: ['"Noto Serif JP"', 'serif'] },
        animation: {
          'fade-in': 'fadeIn 0.8s ease forwards',
          'float': 'float 3s ease-in-out infinite',
        },
        keyframes: {
          fadeIn: { from: { opacity: 0 }, to: { opacity: 1 } },
          float: { '0%,100%': { transform: 'translateY(0)' }, '50%': { transform: 'translateY(-10px)' } },
        },
      }
    }
  }
</script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;700;900&display=swap" rel="stylesheet">
<style>
  body { background-color: #0a0a0a; }
  .gradient-text {
    background: linear-gradient(135deg, #f9a8d4, #be185d, #f9a8d4);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    background-size: 200% auto; animation: shimmer 3s linear infinite;
  }
  @keyframes shimmer { to { background-position: 200% center; } }
  .chara-card {
    background: linear-gradient(145deg, #1a1a1a, #141414);
    border: 1px solid #be185d33; transition: all 0.3s ease;
  }
  .chara-card:hover {
    border-color: #be185d99; transform: translateY(-4px);
    box-shadow: 0 10px 40px #be185d33;
  }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: #0a0a0a; }
  ::-webkit-scrollbar-thumb { background: #be185d; border-radius: 2px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState } = React;

const QUOTES = [
  { ja: "そんな目でみつめるなよ。興奮しちゃうじゃないか。", en: "Don't look at me like that. You'll get me excited." },
  { ja: "いい！！！キミ すごくいいよ！！！その瞳！！その表情！！", en: "Yes!!! You're amazing!!! Those eyes!! That expression!!" },
  { ja: "今のキミはボクに生かされている", en: "Right now, you're alive because I allow it." },
  { ja: "そろそろ狩るか…", en: "Time to hunt..." },
  { ja: "やっぱり便利…僕の薄っぺらな嘘（ドッキリテクスチャー）", en: "So convenient... my Texture Surprise." },
];

const PROFILE = [
  { label: "本名", value: "ヒソカ＝モロウ" },
  { label: "念の系統", value: "変化系" },
  { label: "誕生日", value: "6月6日" },
  { label: "血液型", value: "B型" },
  { label: "身長", value: "187 cm" },
  { label: "体重", value: "91 kg" },
  { label: "特徴", value: "トランプ使い" },
  { label: "元所属", value: "幻影旅団（偽装）" },
];

function QuoteCarousel() {
  const [idx, setIdx] = useState(0);
  const [visible, setVisible] = useState(true);
  const next = () => { setVisible(false); setTimeout(() => { setIdx(i => (i+1) % QUOTES.length); setVisible(true); }, 300); };
  const prev = () => { setVisible(false); setTimeout(() => { setIdx(i => (i-1+QUOTES.length) % QUOTES.length); setVisible(true); }, 300); };
  return (
    <div className="chara-card rounded-2xl p-8 text-center relative overflow-hidden">
      <div className="absolute top-4 left-6 text-6xl opacity-10 font-serif" style={{color:'#be185d'}}>"</div>
      <div className="transition-opacity duration-300 relative z-10" style={{opacity: visible ? 1 : 0}}>
        <p className="text-lg leading-relaxed text-gray-100 font-jp mb-4">{QUOTES[idx].ja}</p>
        <p className="text-sm text-gray-500 italic">{QUOTES[idx].en}</p>
      </div>
      <div className="flex justify-center gap-4 mt-6">
        <button onClick={prev} className="w-10 h-10 rounded-full border text-gray-400 hover:bg-white/5 transition-all flex items-center justify-center" style={{borderColor:'#be185d88'}}>‹</button>
        <div className="flex gap-1 items-center">
          {QUOTES.map((_,i) => (<button key={i} onClick={() => setIdx(i)} className={`w-2 h-2 rounded-full transition-all ${i===idx ? 'w-4' : ''}`} style={{background: i===idx ? '#be185d' : '#444'}} />))}
        </div>
        <button onClick={next} className="w-10 h-10 rounded-full border text-gray-400 hover:bg-white/5 transition-all flex items-center justify-center" style={{borderColor:'#be185d88'}}>›</button>
      </div>
    </div>
  );
}

function App() {
  const [tab, setTab] = useState('profile');
  return (
    <div className="min-h-screen text-white font-jp" style={{background:'#0a0a0a'}}>
      <div className="max-w-4xl mx-auto px-6 pt-4">
        <a href="/" className="text-sm text-gray-500 hover:text-gray-300 transition-colors">← トップページへ戻る</a>
      </div>
      <div className="overflow-hidden" style={{background:'linear-gradient(180deg, #be185d18 0%, #0a0a0a 100%)'}}>
        <div className="max-w-4xl mx-auto px-6 py-20 text-center">
          <div className="inline-block mb-6 px-4 py-1 rounded-full border text-xs tracking-widest" style={{borderColor:'#be185d44', color:'#f9a8d4', background:'#be185d0d'}}>
            奇術師
          </div>
          <h1 className="text-6xl md:text-8xl font-black mb-4 leading-none tracking-tight">
            <span className="gradient-text">HISOKA MOROW</span>
          </h1>
          <p className="text-2xl text-gray-400 mb-2 font-light tracking-widest">ヒソカ＝モロウ</p>
          <div className="flex justify-center gap-3 mt-8 flex-wrap">
            {
            <span className="px-3 py-1 rounded-full text-xs border" style={{borderColor:'#be185d66', color:'#f9a8d4', background:'#be185d11'}}>変化系</span>
            <span className="px-3 py-1 rounded-full text-xs border" style={{borderColor:'#be185d66', color:'#f9a8d4', background:'#be185d11'}}>奇術師</span>
            <span className="px-3 py-1 rounded-full text-xs border" style={{borderColor:'#be185d66', color:'#f9a8d4', background:'#be185d11'}}>戦闘狂</span>}
          </div>
        </div>
      </div>

      <div className="sticky top-0 z-20" style={{background:'rgba(10,10,10,0.95)', backdropFilter:'blur(12px)', borderBottom:'1px solid rgba(255,255,255,0.06)'}}>
        <div className="max-w-4xl mx-auto px-6 flex gap-0 overflow-x-auto">
          {['profile','quotes'].map(t => (
            <button key={t} onClick={() => setTab(t)}
              className={`px-5 py-4 text-sm font-bold whitespace-nowrap transition-all border-b-2 ${
                tab === t ? 'text-gray-100' : 'border-transparent text-gray-500 hover:text-gray-300'
              }`} style={{borderColor: tab === t ? '#be185d' : 'transparent'}}>
              {t === 'profile' ? 'プロフィール' : '名言'}
            </button>
          ))}
        </div>
      </div>

      <div className="max-w-4xl mx-auto px-6 py-12">
        {tab === 'profile' && (
          <div className="animate-fade-in grid md:grid-cols-2 gap-6">
            <div className="chara-card rounded-2xl p-6">
              <h2 className="text-lg font-bold mb-6" style={{color:'#f9a8d4'}}>基本プロフィール</h2>
              <div className="space-y-3">
                {PROFILE.map(({label, value}) => (
                  <div key={label} className="flex justify-between items-center py-2" style={{borderBottom:'1px solid rgba(255,255,255,0.05)'}}>
                    <span className="text-xs text-gray-500 tracking-wider">{label}</span>
                    <span className="text-sm text-gray-200 font-medium">{value}</span>
                  </div>
                ))}
              </div>
            </div>
            <div className="chara-card rounded-2xl p-6">
              <h2 className="text-lg font-bold mb-4" style={{color:'#f9a8d4'}}>キャラクター概要</h2>
              <p className="text-sm text-gray-400 leading-relaxed">戦闘に異常なまでの快楽を見出す謎の奇術師。強者との闘いを極度に好み、潜在能力の高い者を「未熟な果実」として育てる。伸縮自在の愛（バンジーガム）と薄っぺらな嘘（ドッキリテクスチャー）を使う。</p>
            </div>
          </div>
        )}
        {tab === 'quotes' && (
          <div className="animate-fade-in">
            <QuoteCarousel />
            <div className="mt-6 grid gap-4">
              {QUOTES.map((q, i) => (
                <div key={i} className="chara-card rounded-xl p-5">
                  <p className="text-gray-200 text-sm leading-relaxed font-jp">{q.ja}</p>
                </div>
              ))}
            </div>
          </div>
        )}
      </div>

      <footer className="text-center py-10 border-t" style={{borderColor:'rgba(255,255,255,0.05)'}}>
        <p className="text-xs text-gray-700">HUNTER × HUNTER © Yoshihiro Togashi / Shueisha</p>
        <p className="text-xs text-gray-800 mt-1">Fan-made tribute page</p>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
