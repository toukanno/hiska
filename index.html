function AdBanner({ slot, format = "auto", className = "" }) {
  const adRef = useRef(null);
  const pushed = useRef(false);
  useEffect(() => {
    if (adRef.current && !pushed.current) {
      try {
        (window.adsbygoogle = window.adsbygoogle || []).push({});
        pushed.current = true;
      } catch (e) {}
    }
  }, []);
  return (
    <div className={`ad-container my-6 flex justify-center ${className}`}>
      <ins className="adsbygoogle"
        style={{ display: "block", minHeight: "90px" }}
        data-ad-client="ca-pub-XXXXXXXXXXXXXXXX"
        data-ad-slot={slot}
        data-ad-format={format}
        data-full-width-responsive="true"
        ref={adRef}
      />
    </div>
  );
}

// ── Components ────────────────────────────────────────────
function SuitBackground() {
  const suits = ['♠','♥','♦','♣'];
  const items = Array.from({length:18},(_,i) => ({
    suit: suits[i%4],
    left: `${5 + i*5.5}%`,
    delay: `${(i * 1.1).toFixed(1)}s`,
    duration: `${10 + (i % 7) * 2}s`,
    size: `${1 + (i % 3) * 0.5}rem`,
  }));
  return (
    <div className="suit-bg">
      {items.map((item, i) => (
        <span key={i} className="suit-item" style={{
          left: item.left, top: '-80px', animationDelay: item.delay,
          animationDuration: item.duration, fontSize: item.size,
          color: i % 2 === 0 ? '#d4a017' : '#c0392b',
        }}>{item.suit}</span>
      ))}
    </div>
  );
}

function StatBar({ label, value, icon, delay }) {
  const [width, setWidth] = useState(0);
  useEffect(() => {
    setTimeout(() => setWidth(value), delay);
  }, []);
  return (
    <div className="mb-4">
      <div className="flex justify-between items-center mb-1">
        <span className="text-sm text-gray-300 font-jp">{icon} {label}</span>
        <span className="text-sm font-bold" style={{color:'#d4a017'}}>{value}</span>
      </div>
      <div className="progress-track h-2">
        <div className="ability-bar h-2 rounded-full transition-all duration-1000 ease-out"
          style={{width: `${width}%`}} />
      </div>
    </div>
  );
}

function QuoteCarousel({ lang }) {
  const [idx, setIdx] = useState(0);
  const [visible, setVisible] = useState(true);
  const next = () => {
    setVisible(false);
    setTimeout(() => { setIdx(i => (i+1) % QUOTES.length); setVisible(true); }, 300);
  };
  const prev = () => {
    setVisible(false);
    setTimeout(() => { setIdx(i => (i-1+QUOTES.length) % QUOTES.length); setVisible(true); }, 300);
  };
  const primary = lang === 'en' ? QUOTES[idx].en : QUOTES[idx].ja;
  const secondary = lang === 'en' ? QUOTES[idx].ja : QUOTES[idx].en;
  return (
    <div className="hisoka-card rounded-2xl p-8 text-center relative overflow-hidden">
      <div className="absolute top-4 left-6 text-6xl opacity-10 font-serif" style={{color:'#d4a017'}}>"</div>
      <div className="absolute bottom-4 right-6 text-6xl opacity-10 font-serif rotate-180" style={{color:'#d4a017'}}>"</div>
      <div className="transition-opacity duration-300 relative z-10" style={{opacity: visible ? 1 : 0}}>
        <p className="text-lg leading-relaxed text-gray-100 font-jp mb-4">{primary}</p>
        <p className="text-sm text-gray-500 italic">{secondary}</p>
      </div>
      <div className="flex justify-center gap-4 mt-6">
        <button onClick={prev}
          className="w-10 h-10 rounded-full border border-yellow-700 text-yellow-600 hover:bg-yellow-900/30 transition-all flex items-center justify-center">
          ‹
        </button>
        <div className="flex gap-1 items-center">
          {QUOTES.map((_,i) => (
            <button key={i} onClick={() => setIdx(i)}
              className={`w-2 h-2 rounded-full transition-all ${i===idx ? 'bg-red-600 w-4' : 'bg-gray-600'}`} />
          ))}
        </div>
        <button onClick={next}
          className="w-10 h-10 rounded-full border border-yellow-700 text-yellow-600 hover:bg-yellow-900/30 transition-all flex items-center justify-center">
          ›
        </button>
      </div>
    </div>
  );
}
