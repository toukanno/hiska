<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>アルカ＝ゾルディック — 紹介ページ</title>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          alluka: { blue: '#5b7fdb', purple: '#9b59b6', dark: '#0a0a0f', card: '#12121a' },
        },
        fontFamily: { jp: ['"Noto Serif JP"', 'serif'] },
        animation: {
          'fade-in': 'fadeIn 0.8s ease forwards',
          'slide-up': 'slideUp 0.7s ease forwards',
          'float': 'float 3s ease-in-out infinite',
          'glow-pulse': 'glowPulse 2s ease-in-out infinite',
        },
        keyframes: {
          fadeIn: { from: { opacity: 0 }, to: { opacity: 1 } },
          slideUp: { from: { opacity: 0, transform: 'translateY(32px)' }, to: { opacity: 1, transform: 'translateY(0)' } },
          float: { '0%,100%': { transform: 'translateY(0)' }, '50%': { transform: 'translateY(-10px)' } },
          glowPulse: { '0%,100%': { boxShadow: '0 0 20px rgba(91,127,219,0.4)' }, '50%': { boxShadow: '0 0 40px rgba(91,127,219,0.8), 0 0 80px rgba(155,89,182,0.3)' } },
        },
      }
    }
  }
</script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;700;900&display=swap" rel="stylesheet">
<style>
  body { background-color: #0a0a0f; }
  .gradient-text {
    background: linear-gradient(135deg, #5b7fdb, #9b59b6, #5b7fdb);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    background-size: 200% auto; animation: shimmer 3s linear infinite;
  }
  @keyframes shimmer { to { background-position: 200% center; } }
  .alluka-card {
    background: linear-gradient(145deg, #16162a, #12121a);
    border: 1px solid rgba(91,127,219,0.2);
    transition: all 0.3s ease;
  }
  .alluka-card:hover {
    border-color: rgba(155,89,182,0.6);
    transform: translateY(-4px);
    box-shadow: 0 10px 40px rgba(91,127,219,0.2);
  }
  .star-bg {
    position: fixed; inset: 0; overflow: hidden; pointer-events: none; z-index: 0;
  }
  .star-item {
    position: absolute; font-size: 1.2rem; opacity: 0.04; color: #5b7fdb;
    animation: driftDown linear infinite;
  }
  @keyframes driftDown { from { transform: translateY(-80px) rotate(0deg); } to { transform: translateY(110vh) rotate(360deg); } }
  .ability-bar { background: linear-gradient(90deg, #5b7fdb, #9b59b6); }
  .progress-track { background: rgba(255,255,255,0.08); border-radius: 9999px; overflow: hidden; }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: #0a0a0f; }
  ::-webkit-scrollbar-thumb { background: #5b7fdb; border-radius: 2px; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect } = React;

// ── Data ──────────────────────────────────────────────────
const QUOTES = [
  { ja: "キルア…あいしてる", en: "Killua... I love you." },
  { ja: "お兄ちゃんがいれば、アルカはどこでも楽しいよ！", en: "As long as I have my big brother, I can have fun anywhere!" },
  { ja: "ナニカはアルカの大切な家族だよ", en: "Nanika is an important part of Alluka's family." },
  { ja: "お兄ちゃんだけは、ずっとアルカの味方だったもんね", en: "Big brother, you were always on Alluka's side." },
  { ja: "アルカね、お兄ちゃんと一緒にいられるだけで幸せなの", en: "Just being together with my big brother makes Alluka happy." },
];

const STATS = [
  { label: "おねだりの力", value: 100, icon: "☆" },
  { label: "治癒能力", value: 100, icon: "✦" },
  { label: "純粋さ", value: 99, icon: "♡" },
  { label: "危険度", value: 95, icon: "◆" },
  { label: "兄弟愛", value: 100, icon: "☆" },
];

const ABILITIES = [
  {
    name: "おねだり",
    type: "ナニカの能力",
    desc: "ナニカが人に「おねだり」をし、3つの要求を全て叶えると、次に誰かの「お願い」を1つ叶えることができる。おねだりを拒否し続けると、拒否した本人と最も愛する人が同時に死亡する。前回の願いが大きいほど、次のおねだりも過酷になる。",
    color: "from-blue-700 to-blue-900",
    icon: "☆"
  },
  {
    name: "お願い",
    type: "ナニカの能力",
    desc: "ナニカに「お願い」をすると、ほぼあらゆる願いを叶えることができる。治癒、転送、さらには人の命を奪うことすら可能。ただし願いの大きさに比例して、次のおねだりの代償も大きくなる。キルアだけはノーリスクで願いを叶えられる特別な存在。",
    color: "from-purple-700 to-purple-900",
    icon: "✦"
  },
];

const PROFILE = [
  { label: "本名", value: "アルカ＝ゾルディック" },
  { label: "家族", value: "ゾルディック家 第4子" },
  { label: "念の系統", value: "不明（特殊）" },
  { label: "年齢", value: "11歳" },
  { label: "性別", value: "家族からは男扱い（キルアは妹と呼ぶ）" },
  { label: "もうひとつの人格", value: "ナニカ" },
  { label: "最も親しい人物", value: "キルア＝ゾルディック（兄）" },
  { label: "出身", value: "パドキア共和国 クキル山" },
];

// ── Components ────────────────────────────────────────────
function StarBackground() {
  const symbols = ['☆','✦','♡','◇','✧','⋆'];
  const items = Array.from({length:18},(_,i) => ({
    symbol: symbols[i%6],
    left: `${5 + i*5.5}%`,
    delay: `${(i * 1.1).toFixed(1)}s`,
    duration: `${10 + (i % 7) * 2}s`,
    size: `${1 + (i % 3) * 0.5}rem`,
  }));
  return (
    <div className="star-bg">
      {items.map((item, i) => (
        <span key={i} className="star-item" style={{
          left: item.left, top: '-80px', animationDelay: item.delay,
          animationDuration: item.duration, fontSize: item.size,
          color: i % 2 === 0 ? '#5b7fdb' : '#9b59b6',
        }}>{item.symbol}</span>
      ))}
    </div>
  );
}

function StatBar({ label, value, icon, delay }) {
  const [width, setWidth] = useState(0);
  useEffect(() => {
    setTimeout(() => setWidth(value), delay);
  }, []);
  return (
    <div className="mb-4">
      <div className="flex justify-between items-center mb-1">
        <span className="text-sm text-gray-300 font-jp">{icon} {label}</span>
        <span className="text-sm font-bold" style={{color:'#9b59b6'}}>{value}</span>
      </div>
      <div className="progress-track h-2">
        <div className="ability-bar h-2 rounded-full transition-all duration-1000 ease-out"
          style={{width: `${width}%`}} />
      </div>
    </div>
  );
}

function QuoteCarousel() {
  const [idx, setIdx] = useState(0);
  const [visible, setVisible] = useState(true);
  const next = () => {
    setVisible(false);
    setTimeout(() => { setIdx(i => (i+1) % QUOTES.length); setVisible(true); }, 300);
  };
  const prev = () => {
    setVisible(false);
    setTimeout(() => { setIdx(i => (i-1+QUOTES.length) % QUOTES.length); setVisible(true); }, 300);
  };
  return (
    <div className="alluka-card rounded-2xl p-8 text-center relative overflow-hidden">
      <div className="absolute top-4 left-6 text-6xl opacity-10 font-serif" style={{color:'#9b59b6'}}>"</div>
      <div className="absolute bottom-4 right-6 text-6xl opacity-10 font-serif rotate-180" style={{color:'#9b59b6'}}>"</div>
      <div className="transition-opacity duration-300 relative z-10" style={{opacity: visible ? 1 : 0}}>
        <p className="text-lg leading-relaxed text-gray-100 font-jp mb-4">{QUOTES[idx].ja}</p>
        <p className="text-sm text-gray-500 italic">{QUOTES[idx].en}</p>
      </div>
      <div className="flex justify-center gap-4 mt-6">
        <button onClick={prev}
          className="w-10 h-10 rounded-full border border-purple-700 text-purple-400 hover:bg-purple-900/30 transition-all flex items-center justify-center">
          ‹
        </button>
        <div className="flex gap-1 items-center">
          {QUOTES.map((_,i) => (
            <button key={i} onClick={() => setIdx(i)}
              className={`w-2 h-2 rounded-full transition-all ${i===idx ? 'bg-blue-500 w-4' : 'bg-gray-600'}`} />
          ))}
        </div>
        <button onClick={next}
          className="w-10 h-10 rounded-full border border-purple-700 text-purple-400 hover:bg-purple-900/30 transition-all flex items-center justify-center">
          ›
        </button>
      </div>
    </div>
  );
}

function App() {
  const [activeTab, setActiveTab] = useState('profile');
  const tabs = [
    { id: 'profile', label: '☆ プロフィール' },
    { id: 'abilities', label: '✦ 能力' },
    { id: 'stats', label: '♡ ステータス' },
    { id: 'quotes', label: '◇ 名言' },
  ];

  return (
    <div className="min-h-screen text-white font-jp relative" style={{background:'#0a0a0f'}}>
      <StarBackground />

      {/* Hero */}
      <div className="relative z-10 overflow-hidden" style={{background:'linear-gradient(180deg, #0d0d1a 0%, #0a0a0f 100%)'}}>
        <div className="absolute inset-0" style={{background:'radial-gradient(ellipse at 50% 0%, rgba(91,127,219,0.15) 0%, transparent 60%)'}} />
        <div className="max-w-4xl mx-auto px-6 py-20 text-center relative">
          {/* Symbol decoration */}
          <div className="flex justify-center gap-8 mb-8 text-2xl opacity-40">
            {['☆','✦','♡','◇'].map((s,i) => (
              <span key={i} style={{color: i%2===0 ? '#5b7fdb' : '#9b59b6', animationDelay:`${i*0.2}s`}}
                className="animate-float inline-block">{s}</span>
            ))}
          </div>

          <div className="inline-block mb-6 px-4 py-1 rounded-full border text-xs tracking-widest"
            style={{borderColor:'rgba(91,127,219,0.3)', color:'#5b7fdb', background:'rgba(91,127,219,0.05)'}}>
            HUNTER × HUNTER
          </div>

          <h1 className="text-6xl md:text-8xl font-black mb-4 leading-none tracking-tight">
            <span className="gradient-text">ALLUKA</span>
          </h1>
          <p className="text-2xl text-gray-400 mb-2 font-light tracking-widest">アルカ＝ゾルディック</p>
          <p className="text-sm text-gray-600 tracking-widest">ZOLDYCK</p>

          <div className="flex justify-center gap-3 mt-8 flex-wrap">
            {['ゾルディック家', 'ナニカ', 'キルアの妹', '暗黒大陸の何か'].map((tag,i) => (
              <span key={i} className="px-3 py-1 rounded-full text-xs border"
                style={{borderColor:'rgba(91,127,219,0.4)', color:'#a8b8ef', background:'rgba(91,127,219,0.08)'}}>
                {tag}
              </span>
            ))}
          </div>

          {/* Link to Hisoka page */}
          <div className="mt-10">
            <a href="/"
              className="inline-block px-4 py-2 rounded-full text-xs border transition-all hover:bg-red-900/20"
              style={{borderColor:'rgba(192,57,43,0.4)', color:'#ef9e9e'}}>
              ♠ ヒソカのページへ
            </a>
          </div>
        </div>
      </div>

      {/* Tabs */}
      <div className="relative z-10 sticky top-0"
        style={{background:'rgba(10,10,15,0.95)', backdropFilter:'blur(12px)', borderBottom:'1px solid rgba(255,255,255,0.06)'}}>
        <div className="max-w-4xl mx-auto px-6">
          <div className="flex gap-0 overflow-x-auto">
            {tabs.map(tab => (
              <button key={tab.id} onClick={() => setActiveTab(tab.id)}
                className={`px-5 py-4 text-sm font-bold whitespace-nowrap transition-all border-b-2 ${
                  activeTab === tab.id
                    ? 'border-blue-500 text-blue-400'
                    : 'border-transparent text-gray-500 hover:text-gray-300'
                }`}>
                {tab.label}
              </button>
            ))}
          </div>
        </div>
      </div>

      {/* Content */}
      <div className="relative z-10 max-w-4xl mx-auto px-6 py-12">

        {/* Profile */}
        {activeTab === 'profile' && (
          <div className="animate-fade-in grid md:grid-cols-2 gap-6">
            <div className="alluka-card rounded-2xl p-6">
              <h2 className="text-lg font-bold mb-6 flex items-center gap-2" style={{color:'#5b7fdb'}}>
                <span>☆</span> 基本プロフィール
              </h2>
              <div className="space-y-3">
                {PROFILE.map(({ label, value }) => (
                  <div key={label} className="flex justify-between items-center py-2"
                    style={{borderBottom:'1px solid rgba(255,255,255,0.05)'}}>
                    <span className="text-xs text-gray-500 tracking-wider">{label}</span>
                    <span className="text-sm text-gray-200 font-medium text-right">{value}</span>
                  </div>
                ))}
              </div>
            </div>

            <div className="space-y-5">
              <div className="alluka-card rounded-2xl p-6">
                <h2 className="text-lg font-bold mb-4 flex items-center gap-2" style={{color:'#5b7fdb'}}>
                  <span>✦</span> キャラクター概要
                </h2>
                <p className="text-sm text-gray-400 leading-relaxed">
                  アルカ＝ゾルディックは、『HUNTER×HUNTER』に登場するゾルディック家の第4子。
                  体内に「ナニカ」と呼ばれる暗黒大陸出身の謎の存在を宿しており、
                  あらゆる願いを叶える恐るべき力を持つ。家族からは危険視され幽閉されていたが、
                  兄キルアだけはアルカを一人の人間として愛し続けた。
                </p>
              </div>

              <div className="alluka-card rounded-2xl p-6">
                <h2 className="text-lg font-bold mb-4 flex items-center gap-2" style={{color:'#9b59b6'}}>
                  <span>◆</span> ナニカとは
                </h2>
                <p className="text-sm text-gray-400 leading-relaxed">
                  アルカの中に宿るもうひとつの人格「ナニカ」。暗黒大陸に生息する「アイ」と呼ばれるガス生命体が正体とされる。
                  目が真っ黒になり、口が「あ」の形になったときがナニカの状態。
                  キルアの命令には無条件で従い、「キルア、大好き」と語るなど、純粋な愛情を持つ。
                </p>
              </div>
            </div>
          </div>
        )}

        {/* Abilities */}
        {activeTab === 'abilities' && (
          <div className="animate-fade-in space-y-6">
            {ABILITIES.map((ab, i) => (
              <div key={i} className="alluka-card rounded-2xl overflow-hidden">
                <div className={`bg-gradient-to-r ${ab.color} p-4 flex items-center gap-3`}>
                  <span className="text-2xl">{ab.icon}</span>
                  <div>
                    <h3 className="text-xl font-black">{ab.name}</h3>
                    <span className="text-xs opacity-75 tracking-wider">{ab.type}</span>
                  </div>
                </div>
                <div className="p-6">
                  <p className="text-gray-300 text-sm leading-relaxed">{ab.desc}</p>
                </div>
              </div>
            ))}

            <div className="alluka-card rounded-2xl p-6">
              <h3 className="text-sm font-bold mb-4 tracking-widest" style={{color:'#5b7fdb'}}>おねだりのルール</h3>
              <div className="space-y-3">
                {[
                  "ナニカの「おねだり」を3つ連続で叶えると「お願い」ができる",
                  "おねだりを4回拒否すると、拒否者と最愛の人が同時に死亡",
                  "前回の「お願い」が大きいほど、次の「おねだり」も過酷になる",
                  "キルアだけは「おねだり」なしで直接命令が可能",
                ].map((rule, i) => (
                  <div key={i} className="flex items-start gap-3 text-sm text-gray-400">
                    <span className="text-purple-400 mt-0.5 flex-shrink-0">✦</span>
                    <span>{rule}</span>
                  </div>
                ))}
              </div>
            </div>
          </div>
        )}

        {/* Stats */}
        {activeTab === 'stats' && (
          <div className="animate-fade-in grid md:grid-cols-2 gap-6">
            <div className="alluka-card rounded-2xl p-6">
              <h2 className="text-lg font-bold mb-6 flex items-center gap-2" style={{color:'#5b7fdb'}}>
                <span>♡</span> ステータス
              </h2>
              {STATS.map((s, i) => (
                <StatBar key={s.label} {...s} delay={i * 150} />
              ))}
            </div>

            <div className="space-y-4">
              {[
                { label: '願望実現力', grade: 'EX', desc: 'あらゆる願いを叶える規格外の力', color: '#9b59b6' },
                { label: '危険度', grade: 'EX', desc: '代償次第で世界規模の災害を起こしうる', color: '#e74c3c' },
                { label: '家族の絆', grade: 'S+', desc: 'キルアとの絆が能力の鍵を握る', color: '#5b7fdb' },
                { label: '未知度', grade: 'S', desc: '暗黒大陸の「アイ」の全容は不明', color: '#2ecc71' },
              ].map((item, i) => (
                <div key={i} className="alluka-card rounded-xl p-4 flex items-center gap-4">
                  <div className="w-12 h-12 rounded-xl flex items-center justify-center font-black text-lg flex-shrink-0"
                    style={{background:`${item.color}22`, color:item.color, border:`1px solid ${item.color}44`}}>
                    {item.grade}
                  </div>
                  <div>
                    <p className="font-bold text-sm text-gray-200">{item.label}</p>
                    <p className="text-xs text-gray-500 mt-0.5">{item.desc}</p>
                  </div>
                </div>
              ))}
            </div>
          </div>
        )}

        {/* Quotes */}
        {activeTab === 'quotes' && (
          <div className="animate-fade-in">
            <QuoteCarousel />
            <div className="mt-6 grid gap-4">
              {QUOTES.map((q, i) => (
                <div key={i} className="alluka-card rounded-xl p-5">
                  <p className="text-gray-200 text-sm leading-relaxed font-jp">{q.ja}</p>
                </div>
              ))}
            </div>
          </div>
        )}
      </div>

      {/* Footer */}
      <footer className="relative z-10 text-center py-10 border-t" style={{borderColor:'rgba(255,255,255,0.05)'}}>
        <p className="text-2xl mb-2">☆ ✦ ♡ ◇</p>
        <p className="text-xs text-gray-700">HUNTER × HUNTER © Yoshihiro Togashi / Shueisha</p>
        <p className="text-xs text-gray-800 mt-1">Fan-made tribute page</p>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
