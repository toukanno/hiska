<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>カルト＝ゾルディック — 幻影旅団 No.4</title>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          chara: { primary: '#8b5cf6', accent: '#c4b5fd', dark: '#0a0a0a', card: '#141414' },
        },
        fontFamily: { jp: ['"Noto Serif JP"', 'serif'] },
        animation: {
          'fade-in': 'fadeIn 0.8s ease forwards',
          'float': 'float 3s ease-in-out infinite',
        },
        keyframes: {
          fadeIn: { from: { opacity: 0 }, to: { opacity: 1 } },
          float: { '0%,100%': { transform: 'translateY(0)' }, '50%': { transform: 'translateY(-10px)' } },
        },
      }
    }
  }
</script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;700;900&display=swap" rel="stylesheet">
<style>
  body { background-color: #0a0a0a; }
  .gradient-text {
    background: linear-gradient(135deg, #c4b5fd, #8b5cf6, #c4b5fd);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    background-size: 200% auto; animation: shimmer 3s linear infinite;
  }
  @keyframes shimmer { to { background-position: 200% center; } }
  .chara-card {
    background: linear-gradient(145deg, #1a1a1a, #141414);
    border: 1px solid rgba(139,92,246,0.2); transition: all 0.3s ease;
  }
  .chara-card:hover {
    border-color: rgba(139,92,246,0.6); transform: translateY(-4px);
    box-shadow: 0 10px 40px rgba(139,92,246,0.2);
  }
  .suit-bg { position: fixed; inset: 0; overflow: hidden; pointer-events: none; z-index: 0; }
  .suit-item { position: absolute; font-size: 1.5rem; opacity: 0.03; animation: driftDown linear infinite; }
  @keyframes driftDown { from { transform: translateY(-80px) rotate(0deg); } to { transform: translateY(110vh) rotate(360deg); } }
  .ability-bar { background: linear-gradient(90deg, #8b5cf6, #c4b5fd); }
  .progress-track { background: rgba(255,255,255,0.08); border-radius: 9999px; overflow: hidden; }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: #0a0a0a; }
  ::-webkit-scrollbar-thumb { background: #8b5cf6; border-radius: 2px; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect } = React;

const QUOTES = [
  { ja: "兄さんを取り戻す…そのためなら何でもする", en: "I'll get my brother back... I'll do anything for that." },
  { ja: "僕はゾルディック家の人間だ", en: "I am a member of the Zoldyck family." },
  { ja: "まだ…僕は弱い", en: "I'm still... weak." },
];

const STATS = [
  { label: "念能力", value: 72, icon: "🎋" },
  { label: "戦闘力", value: 68, icon: "⚔" },
  { label: "知性", value: 78, icon: "◈" },
  { label: "スピード", value: 80, icon: "◇" },
  { label: "潜在能力", value: 90, icon: "★" },
];

const ABILITIES = [
  {
    name: "紙を操る念能力",
    type: "操作系",
    desc: "紙吹雪のような紙片を操作する念能力。紙を自在に操り、敵を切り裂いたり、情報収集に利用する。ゾルディック家の暗殺術と組み合わせることで、静かに確実にターゲットを仕留める。まだ若く成長途上だが、そのポテンシャルはゾルディック家の血統に相応しい。",
    color: "from-violet-600 to-violet-800",
    icon: "🎋"
  },
  {
    name: "蛇活（だかつ）",
    type: "操作系",
    desc: "紙を蛇のように操り、対象に巻き付けて情報を読み取る技。紙吹雪を空中に舞わせ、音の振動を拾うことで盗聴も可能。ゾルディック家の暗殺者としての訓練と念能力を融合させた、情報戦に特化した能力。",
    color: "from-purple-600 to-purple-800",
    icon: "🐍"
  },
];

const PROFILE = [
  { label: "本名", value: "カルト＝ゾルディック" },
  { label: "所属", value: "幻影旅団 No.4" },
  { label: "念の系統", value: "操作系" },
  { label: "誕生日", value: "4月4日" },
  { label: "血液型", value: "A型" },
  { label: "身長", value: "150 cm" },
  { label: "体重", value: "31 kg" },
  { label: "出身", value: "パドキア共和国" },
  { label: "家族", value: "ゾルディック家 五男" },
];

function SymbolBackground() {
  const symbols = ['🎋','✧','◈','◇','★'];
  const items = Array.from({length:18},(_,i) => ({
    symbol: symbols[i%5], left: `${5 + i*5.5}%`,
    delay: `${(i * 1.1).toFixed(1)}s`, duration: `${10 + (i % 7) * 2}s`, size: `${1 + (i % 3) * 0.5}rem`,
  }));
  return (
    <div className="suit-bg">
      {items.map((item, i) => (
        <span key={i} className="suit-item" style={{ left: item.left, top: '-80px', animationDelay: item.delay, animationDuration: item.duration, fontSize: item.size, color: i % 2 === 0 ? '#8b5cf6' : '#c4b5fd' }}>{item.symbol}</span>
      ))}
    </div>
  );
}

function StatBar({ label, value, icon, delay }) {
  const [width, setWidth] = useState(0);
  useEffect(() => { setTimeout(() => setWidth(value), delay); }, []);
  return (
    <div className="mb-4">
      <div className="flex justify-between items-center mb-1">
        <span className="text-sm text-gray-300 font-jp">{icon} {label}</span>
        <span className="text-sm font-bold" style={{color:'#c4b5fd'}}>{value}</span>
      </div>
      <div className="progress-track h-2">
        <div className="ability-bar h-2 rounded-full transition-all duration-1000 ease-out" style={{width:`${width}%`}} />
      </div>
    </div>
  );
}

function QuoteCarousel() {
  const [idx, setIdx] = useState(0);
  const [visible, setVisible] = useState(true);
  const next = () => { setVisible(false); setTimeout(() => { setIdx(i => (i+1) % QUOTES.length); setVisible(true); }, 300); };
  const prev = () => { setVisible(false); setTimeout(() => { setIdx(i => (i-1+QUOTES.length) % QUOTES.length); setVisible(true); }, 300); };
  return (
    <div className="chara-card rounded-2xl p-8 text-center relative overflow-hidden">
      <div className="absolute top-4 left-6 text-6xl opacity-10 font-serif" style={{color:'#8b5cf6'}}>"</div>
      <div className="absolute bottom-4 right-6 text-6xl opacity-10 font-serif rotate-180" style={{color:'#8b5cf6'}}>"</div>
      <div className="transition-opacity duration-300 relative z-10" style={{opacity: visible ? 1 : 0}}>
        <p className="text-lg leading-relaxed text-gray-100 font-jp mb-4">{QUOTES[idx].ja}</p>
        <p className="text-sm text-gray-500 italic">{QUOTES[idx].en}</p>
      </div>
      <div className="flex justify-center gap-4 mt-6">
        <button onClick={prev} className="w-10 h-10 rounded-full border border-violet-700 text-violet-400 hover:bg-violet-900/30 transition-all flex items-center justify-center">‹</button>
        <div className="flex gap-1 items-center">
          {QUOTES.map((_,i) => (<button key={i} onClick={() => setIdx(i)} className={`w-2 h-2 rounded-full transition-all ${i===idx ? 'bg-violet-600 w-4' : 'bg-gray-600'}`} />))}
        </div>
        <button onClick={next} className="w-10 h-10 rounded-full border border-violet-700 text-violet-400 hover:bg-violet-900/30 transition-all flex items-center justify-center">›</button>
      </div>
    </div>
  );
}

function App() {
  const [activeTab, setActiveTab] = useState('profile');
  const tabs = [
    { id: 'profile', label: '🎋 プロフィール' },
    { id: 'abilities', label: '✧ 能力' },
    { id: 'stats', label: '◇ ステータス' },
    { id: 'quotes', label: '★ 名言' },
  ];

  return (
    <div className="min-h-screen text-white font-jp relative" style={{background:'#0a0a0a'}}>
      <SymbolBackground />
      <div className="relative z-10 max-w-4xl mx-auto px-6 pt-4">
        <a href="index.html" className="text-sm text-gray-500 hover:text-violet-400 transition-colors">← トップページへ戻る</a>
      </div>
      <div className="relative z-10 overflow-hidden" style={{background:'linear-gradient(180deg, #100520 0%, #0a0a0a 100%)'}}>
        <div className="absolute inset-0" style={{background:'radial-gradient(ellipse at 50% 0%, rgba(139,92,246,0.15) 0%, transparent 60%)'}} />
        <div className="max-w-4xl mx-auto px-6 py-20 text-center relative">
          <div className="flex justify-center gap-8 mb-8 text-2xl opacity-40">
            {['🎋','✧','◈','★'].map((s,i) => (
              <span key={i} style={{color: i%2===0 ? '#8b5cf6' : '#c4b5fd', animationDelay:`${i*0.2}s`}} className="animate-float inline-block">{s}</span>
            ))}
          </div>
          <div className="inline-block mb-6 px-4 py-1 rounded-full border text-xs tracking-widest"
            style={{borderColor:'rgba(139,92,246,0.3)', color:'#c4b5fd', background:'rgba(139,92,246,0.05)'}}>
            PHANTOM TROUPE — No.4
          </div>
          <h1 className="text-6xl md:text-8xl font-black mb-4 leading-none tracking-tight">
            <span className="gradient-text">KALLUTO</span>
          </h1>
          <p className="text-2xl text-gray-400 mb-2 font-light tracking-widest">カルト＝ゾルディック</p>
          <p className="text-sm text-gray-600 tracking-widest">ZOLDYCK</p>
          <div className="flex justify-center gap-3 mt-8 flex-wrap">
            {['ゾルディック家', '操作系', 'No.4', '暗殺者'].map((tag,i) => (
              <span key={i} className="px-3 py-1 rounded-full text-xs border"
                style={{borderColor:'rgba(139,92,246,0.4)', color:'#ddd6fe', background:'rgba(139,92,246,0.08)'}}>
                {tag}
              </span>
            ))}
          </div>
        </div>
      </div>

      <div className="relative z-10 sticky top-0" style={{background:'rgba(10,10,10,0.95)', backdropFilter:'blur(12px)', borderBottom:'1px solid rgba(255,255,255,0.06)'}}>
        <div className="max-w-4xl mx-auto px-6">
          <div className="flex gap-0 overflow-x-auto">
            {tabs.map(tab => (
              <button key={tab.id} onClick={() => setActiveTab(tab.id)}
                className={`px-5 py-4 text-sm font-bold whitespace-nowrap transition-all border-b-2 ${
                  activeTab === tab.id ? 'border-violet-600 text-violet-400' : 'border-transparent text-gray-500 hover:text-gray-300'
                }`}>{tab.label}</button>
            ))}
          </div>
        </div>
      </div>

      <div className="relative z-10 max-w-4xl mx-auto px-6 py-12">
        {activeTab === 'profile' && (
          <div className="animate-fade-in grid md:grid-cols-2 gap-6">
            <div className="chara-card rounded-2xl p-6">
              <h2 className="text-lg font-bold mb-6 flex items-center gap-2" style={{color:'#c4b5fd'}}>
                <span>🎋</span> 基本プロフィール
              </h2>
              <div className="space-y-3">
                {PROFILE.map(({ label, value }) => (
                  <div key={label} className="flex justify-between items-center py-2" style={{borderBottom:'1px solid rgba(255,255,255,0.05)'}}>
                    <span className="text-xs text-gray-500 tracking-wider">{label}</span>
                    <span className="text-sm text-gray-200 font-medium">{value}</span>
                  </div>
                ))}
              </div>
            </div>
            <div className="space-y-5">
              <div className="chara-card rounded-2xl p-6">
                <h2 className="text-lg font-bold mb-4 flex items-center gap-2" style={{color:'#c4b5fd'}}>
                  <span>◈</span> キャラクター概要
                </h2>
                <p className="text-sm text-gray-400 leading-relaxed">
                  カルト＝ゾルディックはゾルディック家の五男であり、ヒソカの脱退後に幻影旅団No.4として加入。和装を好む中性的な美少年。兄であるキルアの「ある部分」を取り戻すために旅団に入団したとされる。ゾルディック家の暗殺術を念能力と融合させた独自の戦闘スタイルを持つ。
                </p>
              </div>
              <div className="chara-card rounded-2xl p-6" style={{background:'linear-gradient(135deg, rgba(139,92,246,0.1), rgba(196,181,253,0.05))'}}>
                <h2 className="text-sm font-bold mb-3 text-gray-400 tracking-widest">ゾルディック家</h2>
                <p className="text-3xl font-black gradient-text">五男</p>
                <p className="text-xs text-gray-600 mt-1">伝説の暗殺一族の末弟</p>
              </div>
            </div>
          </div>
        )}

        {activeTab === 'abilities' && (
          <div className="animate-fade-in space-y-6">
            {ABILITIES.map((ab, i) => (
              <div key={i} className="chara-card rounded-2xl overflow-hidden">
                <div className={`bg-gradient-to-r ${ab.color} p-4 flex items-center gap-3`}>
                  <span className="text-2xl">{ab.icon}</span>
                  <div>
                    <h3 className="text-xl font-black">{ab.name}</h3>
                    <span className="text-xs opacity-75 tracking-wider">{ab.type}</span>
                  </div>
                </div>
                <div className="p-6"><p className="text-gray-300 text-sm leading-relaxed">{ab.desc}</p></div>
              </div>
            ))}
          </div>
        )}

        {activeTab === 'stats' && (
          <div className="animate-fade-in grid md:grid-cols-2 gap-6">
            <div className="chara-card rounded-2xl p-6">
              <h2 className="text-lg font-bold mb-6 flex items-center gap-2" style={{color:'#c4b5fd'}}>
                <span>◇</span> 戦闘ステータス
              </h2>
              {STATS.map((s, i) => (<StatBar key={s.label} {...s} delay={i * 150} />))}
            </div>
            <div className="space-y-4">
              {[
                { label: '暗殺技術', grade: 'A+', desc: 'ゾルディック家仕込みの暗殺術', color: '#8b5cf6' },
                { label: '情報収集', grade: 'S', desc: '紙を使った盗聴・諜報能力', color: '#c4b5fd' },
                { label: '成長性', grade: 'EX', desc: 'ゾルディックの血が秘める無限の可能性', color: '#8b5cf6' },
                { label: '隠密行動', grade: 'S', desc: '暗殺者としての気配遮断能力', color: '#a78bfa' },
              ].map((item, i) => (
                <div key={i} className="chara-card rounded-xl p-4 flex items-center gap-4">
                  <div className="w-12 h-12 rounded-xl flex items-center justify-center font-black text-lg flex-shrink-0"
                    style={{background:`${item.color}22`, color:item.color, border:`1px solid ${item.color}44`}}>
                    {item.grade}
                  </div>
                  <div>
                    <p className="font-bold text-sm text-gray-200">{item.label}</p>
                    <p className="text-xs text-gray-500 mt-0.5">{item.desc}</p>
                  </div>
                </div>
              ))}
            </div>
          </div>
        )}

        {activeTab === 'quotes' && (
          <div className="animate-fade-in">
            <QuoteCarousel />
            <div className="mt-6 grid gap-4">
              {QUOTES.map((q, i) => (
                <div key={i} className="chara-card rounded-xl p-5">
                  <p className="text-gray-200 text-sm leading-relaxed font-jp">{q.ja}</p>
                </div>
              ))}
            </div>
          </div>
        )}
      </div>

      <footer className="relative z-10 text-center py-10 border-t" style={{borderColor:'rgba(255,255,255,0.05)'}}>
        <p className="text-2xl mb-2">🎋 ✧ ◈ ★</p>
        <p className="text-xs text-gray-700">HUNTER × HUNTER © Yoshihiro Togashi / Shueisha</p>
        <p className="text-xs text-gray-800 mt-1">Fan-made tribute page</p>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
