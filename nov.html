<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ノヴ — 紹介ページ</title>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          knov: { purple: '#6c3483', indigo: '#4a69bd', dark: '#0a0a0a', card: '#141414' },
        },
        fontFamily: { jp: ['"Noto Serif JP"', 'serif'] },
        animation: {
          'fade-in': 'fadeIn 0.8s ease forwards',
          'slide-up': 'slideUp 0.7s ease forwards',
          'float': 'float 3s ease-in-out infinite',
          'glow-pulse': 'glowPulse 2s ease-in-out infinite',
        },
        keyframes: {
          fadeIn: { from: { opacity: 0 }, to: { opacity: 1 } },
          slideUp: { from: { opacity: 0, transform: 'translateY(32px)' }, to: { opacity: 1, transform: 'translateY(0)' } },
          float: { '0%,100%': { transform: 'translateY(0)' }, '50%': { transform: 'translateY(-10px)' } },
          glowPulse: { '0%,100%': { boxShadow: '0 0 20px rgba(108,52,131,0.4)' }, '50%': { boxShadow: '0 0 40px rgba(108,52,131,0.8), 0 0 80px rgba(108,52,131,0.3)' } },
        },
      }
    }
  }
</script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;700;900&display=swap" rel="stylesheet">
<style>
  body { background-color: #0a0a0a; }
  .gradient-text {
    background: linear-gradient(135deg, #4a69bd, #6c3483, #4a69bd);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    background-size: 200% auto; animation: shimmer 3s linear infinite;
  }
  @keyframes shimmer { to { background-position: 200% center; } }
  .knov-card {
    background: linear-gradient(145deg, #1a1a1a, #141414);
    border: 1px solid rgba(74,105,189,0.2);
    transition: all 0.3s ease;
  }
  .knov-card:hover {
    border-color: rgba(74,105,189,0.6);
    transform: translateY(-4px);
    box-shadow: 0 10px 40px rgba(108,52,131,0.2);
  }
  .portal-bg {
    position: fixed; inset: 0; overflow: hidden; pointer-events: none; z-index: 0;
  }
  .portal-item {
    position: absolute; font-size: 1.5rem; opacity: 0.03; color: #4a69bd;
    animation: driftDown linear infinite;
  }
  @keyframes driftDown { from { transform: translateY(-80px) rotate(0deg); } to { transform: translateY(110vh) rotate(360deg); } }
  .ability-bar { background: linear-gradient(90deg, #6c3483, #4a69bd); }
  .progress-track { background: rgba(255,255,255,0.08); border-radius: 9999px; overflow: hidden; }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: #0a0a0a; }
  ::-webkit-scrollbar-thumb { background: #6c3483; border-radius: 2px; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ── Data ──────────────────────────────────────────────────
const QUOTES = [
  { ja: "僕の4次元マンションに不可能はない", en: "Nothing is impossible in my Fourth-Dimensional Mansion." },
  { ja: "…もう…無理だ…あんな化け物の傍には…いられない…", en: "...I can't do it anymore... I can't be near a monster like that..." },
  { ja: "窓を開けるだけでいい…それだけで終わる", en: "I just need to open a window... That alone will end it." },
  { ja: "作戦の要は僕の能力だ。失敗は許されない", en: "My ability is the key to this operation. Failure is not an option." },
  { ja: "モラウ…後は頼む…", en: "Morel... I leave the rest to you..." },
];

const STATS = [
  { label: "念能力", value: 90, icon: "◇" },
  { label: "知性", value: 95, icon: "◆" },
  { label: "戦略性", value: 93, icon: "□" },
  { label: "精神力", value: 45, icon: "■" },
  { label: "サポート力", value: 98, icon: "◇" },
];

const ABILITIES = [
  {
    name: "4次元マンション（ハイドアンドシーク）",
    type: "具現化系",
    desc: "異空間に最大32室の部屋を持つマンションを具現化する能力。各部屋にはマスターキーでのみ出入り可能。物資の保管、人員の移動、潜入作戦など戦略的に極めて有用。東ゴルトー共和国への侵入作戦において要となった。",
    color: "from-purple-700 to-purple-900",
    icon: "◆"
  },
  {
    name: "窓を開く者（スクリーム）",
    type: "具現化系",
    desc: "4次元マンションの応用技。対象を4次元空間の入口で切断する攻撃能力。窓の縁が次元の断層となり、触れたものを問答無用で切断する。防御不能の即死級攻撃だが、精神的に追い詰められた後は使用が困難になった。",
    color: "from-indigo-700 to-indigo-900",
    icon: "□"
  },
];

const PROFILE = [
  { label: "本名", value: "ノヴ" },
  { label: "職業", value: "ハンター" },
  { label: "念の系統", value: "具現化系" },
  { label: "所属", value: "討伐隊（キメラアント編）" },
  { label: "師弟関係", value: "パーム＝シベリアの師匠" },
  { label: "身長", value: "不明" },
  { label: "体重", value: "不明" },
  { label: "特徴", value: "眼鏡・スーツ姿の知的な風貌" },
  { label: "髪", value: "黒髪（精神崩壊後は白髪）" },
];

// ── Components ────────────────────────────────────────────
function PortalBackground() {
  const symbols = ['◇','◆','□','■','△','▽'];
  const items = Array.from({length:18},(_,i) => ({
    symbol: symbols[i%6],
    left: `${5 + i*5.5}%`,
    delay: `${(i * 1.1).toFixed(1)}s`,
    duration: `${10 + (i % 7) * 2}s`,
    size: `${1 + (i % 3) * 0.5}rem`,
  }));
  return (
    <div className="portal-bg">
      {items.map((item, i) => (
        <span key={i} className="portal-item" style={{
          left: item.left, top: '-80px', animationDelay: item.delay,
          animationDuration: item.duration, fontSize: item.size,
          color: i % 2 === 0 ? '#4a69bd' : '#6c3483',
        }}>{item.symbol}</span>
      ))}
    </div>
  );
}

function StatBar({ label, value, icon, delay }) {
  const [width, setWidth] = useState(0);
  useEffect(() => {
    setTimeout(() => setWidth(value), delay);
  }, []);
  return (
    <div className="mb-4">
      <div className="flex justify-between items-center mb-1">
        <span className="text-sm text-gray-300 font-jp">{icon} {label}</span>
        <span className="text-sm font-bold" style={{color:'#4a69bd'}}>{value}</span>
      </div>
      <div className="progress-track h-2">
        <div className="ability-bar h-2 rounded-full transition-all duration-1000 ease-out"
          style={{width: `${width}%`}} />
      </div>
    </div>
  );
}

function QuoteCarousel() {
  const [idx, setIdx] = useState(0);
  const [visible, setVisible] = useState(true);
  const next = () => {
    setVisible(false);
    setTimeout(() => { setIdx(i => (i+1) % QUOTES.length); setVisible(true); }, 300);
  };
  const prev = () => {
    setVisible(false);
    setTimeout(() => { setIdx(i => (i-1+QUOTES.length) % QUOTES.length); setVisible(true); }, 300);
  };
  return (
    <div className="knov-card rounded-2xl p-8 text-center relative overflow-hidden">
      <div className="absolute top-4 left-6 text-6xl opacity-10 font-serif" style={{color:'#4a69bd'}}>"</div>
      <div className="absolute bottom-4 right-6 text-6xl opacity-10 font-serif rotate-180" style={{color:'#4a69bd'}}>"</div>
      <div className="transition-opacity duration-300 relative z-10" style={{opacity: visible ? 1 : 0}}>
        <p className="text-lg leading-relaxed text-gray-100 font-jp mb-4">{QUOTES[idx].ja}</p>
        <p className="text-sm text-gray-500 italic">{QUOTES[idx].en}</p>
      </div>
      <div className="flex justify-center gap-4 mt-6">
        <button onClick={prev}
          className="w-10 h-10 rounded-full border border-indigo-700 text-indigo-400 hover:bg-indigo-900/30 transition-all flex items-center justify-center">
          ‹
        </button>
        <div className="flex gap-1 items-center">
          {QUOTES.map((_,i) => (
            <button key={i} onClick={() => setIdx(i)}
              className={`w-2 h-2 rounded-full transition-all ${i===idx ? 'bg-purple-600 w-4' : 'bg-gray-600'}`} />
          ))}
        </div>
        <button onClick={next}
          className="w-10 h-10 rounded-full border border-indigo-700 text-indigo-400 hover:bg-indigo-900/30 transition-all flex items-center justify-center">
          ›
        </button>
      </div>
    </div>
  );
}

function App() {
  const [activeTab, setActiveTab] = useState('profile');
  const tabs = [
    { id: 'profile', label: '◆ プロフィール' },
    { id: 'abilities', label: '□ 能力' },
    { id: 'stats', label: '◇ ステータス' },
    { id: 'quotes', label: '■ 名言' },
  ];

  return (
    <div className="min-h-screen text-white font-jp relative" style={{background:'#0a0a0a'}}>
      <PortalBackground />

      {/* Nav link */}
      <div className="relative z-10 px-6 pt-4">
        <a href="index.html" className="text-xs text-gray-600 hover:text-gray-400 transition-colors">
          ← ヒソカのページへ
        </a>
      </div>

      {/* Hero */}
      <div className="relative z-10 overflow-hidden" style={{background:'linear-gradient(180deg, #0a0515 0%, #0a0a0a 100%)'}}>
        <div className="absolute inset-0" style={{background:'radial-gradient(ellipse at 50% 0%, rgba(108,52,131,0.15) 0%, transparent 60%)'}} />
        <div className="max-w-4xl mx-auto px-6 py-20 text-center relative">
          {/* Symbol decoration */}
          <div className="flex justify-center gap-8 mb-8 text-2xl opacity-40">
            {['◇','◆','□','■'].map((s,i) => (
              <span key={i} style={{color: i%2===0 ? '#4a69bd' : '#6c3483', animationDelay:`${i*0.2}s`}}
                className="animate-float inline-block">{s}</span>
            ))}
          </div>

          <div className="inline-block mb-6 px-4 py-1 rounded-full border text-xs tracking-widest"
            style={{borderColor:'rgba(74,105,189,0.3)', color:'#4a69bd', background:'rgba(74,105,189,0.05)'}}>
            HUNTER × HUNTER
          </div>

          <h1 className="text-6xl md:text-8xl font-black mb-4 leading-none tracking-tight">
            <span className="gradient-text">KNOV</span>
          </h1>
          <p className="text-2xl text-gray-400 mb-2 font-light tracking-widest">ノヴ</p>
          <p className="text-sm text-gray-600 tracking-widest">HIDE AND SEEK</p>

          <div className="flex justify-center gap-3 mt-8 flex-wrap">
            {['ハンター', '具現化系', '討伐隊', '戦略家'].map((tag,i) => (
              <span key={i} className="px-3 py-1 rounded-full text-xs border"
                style={{borderColor:'rgba(108,52,131,0.4)', color:'#b39ddb', background:'rgba(108,52,131,0.08)'}}>
                {tag}
              </span>
            ))}
          </div>
        </div>
      </div>

      {/* Tabs */}
      <div className="relative z-10 sticky top-0"
        style={{background:'rgba(10,10,10,0.95)', backdropFilter:'blur(12px)', borderBottom:'1px solid rgba(255,255,255,0.06)'}}>
        <div className="max-w-4xl mx-auto px-6">
          <div className="flex gap-0 overflow-x-auto">
            {tabs.map(tab => (
              <button key={tab.id} onClick={() => setActiveTab(tab.id)}
                className={`px-5 py-4 text-sm font-bold whitespace-nowrap transition-all border-b-2 ${
                  activeTab === tab.id
                    ? 'border-purple-600 text-purple-400'
                    : 'border-transparent text-gray-500 hover:text-gray-300'
                }`}>
                {tab.label}
              </button>
            ))}
          </div>
        </div>
      </div>

      {/* Content */}
      <div className="relative z-10 max-w-4xl mx-auto px-6 py-12">

        {/* Profile */}
        {activeTab === 'profile' && (
          <div className="animate-fade-in grid md:grid-cols-2 gap-6">
            <div className="knov-card rounded-2xl p-6">
              <h2 className="text-lg font-bold mb-6 flex items-center gap-2" style={{color:'#4a69bd'}}>
                <span>◆</span> 基本プロフィール
              </h2>
              <div className="space-y-3">
                {PROFILE.map(({ label, value }) => (
                  <div key={label} className="flex justify-between items-center py-2"
                    style={{borderBottom:'1px solid rgba(255,255,255,0.05)'}}>
                    <span className="text-xs text-gray-500 tracking-wider">{label}</span>
                    <span className="text-sm text-gray-200 font-medium">{value}</span>
                  </div>
                ))}
              </div>
            </div>

            <div className="space-y-5">
              <div className="knov-card rounded-2xl p-6">
                <h2 className="text-lg font-bold mb-4 flex items-center gap-2" style={{color:'#4a69bd'}}>
                  <span>◇</span> キャラクター概要
                </h2>
                <p className="text-sm text-gray-400 leading-relaxed">
                  ノヴは、『HUNTER×HUNTER』キメラアント編に登場するハンター。
                  冷静沈着で知的な人物であり、具現化系能力「4次元マンション（ハイドアンドシーク）」を駆使して
                  討伐隊の兵站・潜入を一手に担った。しかし、王直属護衛軍のオーラを目の当たりにしたことで
                  精神が崩壊し、髪が一夜にして白髪となった悲劇のキャラクター。
                </p>
              </div>

              <div className="knov-card rounded-2xl p-6"
                style={{background:'linear-gradient(135deg, rgba(108,52,131,0.1), rgba(74,105,189,0.05))'}}>
                <h2 className="text-sm font-bold mb-3 text-gray-400 tracking-widest">東ゴルトー共和国 宮殿突入作戦</h2>
                <p className="text-3xl font-black gradient-text">戦線離脱</p>
                <p className="text-xs text-gray-600 mt-1">護衛軍のオーラに精神崩壊</p>
              </div>
            </div>
          </div>
        )}

        {/* Abilities */}
        {activeTab === 'abilities' && (
          <div className="animate-fade-in space-y-6">
            {ABILITIES.map((ab, i) => (
              <div key={i} className="knov-card rounded-2xl overflow-hidden">
                <div className={`bg-gradient-to-r ${ab.color} p-4 flex items-center gap-3`}>
                  <span className="text-2xl">{ab.icon}</span>
                  <div>
                    <h3 className="text-xl font-black">{ab.name}</h3>
                    <span className="text-xs opacity-75 tracking-wider">{ab.type}</span>
                  </div>
                </div>
                <div className="p-6">
                  <p className="text-gray-300 text-sm leading-relaxed">{ab.desc}</p>
                </div>
              </div>
            ))}

            <div className="knov-card rounded-2xl p-6 text-center"
              style={{background:'linear-gradient(135deg, rgba(74,105,189,0.06), rgba(108,52,131,0.06))'}}>
              <p className="text-4xl mb-3">◆</p>
              <p className="text-sm text-gray-500 leading-relaxed">
                戦闘能力だけでなく、兵站・移動手段としても<br/>
                極めて高い汎用性を持つ稀有な能力<br/>
                <span className="text-gray-300 italic">— 4次元マンション</span>
              </p>
            </div>
          </div>
        )}

        {/* Stats */}
        {activeTab === 'stats' && (
          <div className="animate-fade-in grid md:grid-cols-2 gap-6">
            <div className="knov-card rounded-2xl p-6">
              <h2 className="text-lg font-bold mb-6 flex items-center gap-2" style={{color:'#4a69bd'}}>
                <span>◇</span> 能力ステータス
              </h2>
              {STATS.map((s, i) => (
                <StatBar key={s.label} {...s} delay={i * 150} />
              ))}
            </div>

            <div className="space-y-4">
              {[
                { label: '戦略立案能力', grade: 'S+', desc: '宮殿突入作戦の兵站を担当', color: '#4a69bd' },
                { label: '念の習熟度', grade: 'S', desc: '具現化系の中でもトップクラス', color: '#6c3483' },
                { label: '攻撃能力', grade: 'A', desc: 'スクリームによる即死級攻撃', color: '#4a69bd' },
                { label: '精神耐性', grade: 'D', desc: '護衛軍のオーラで精神崩壊', color: '#ef4444' },
              ].map((item, i) => (
                <div key={i} className="knov-card rounded-xl p-4 flex items-center gap-4">
                  <div className="w-12 h-12 rounded-xl flex items-center justify-center font-black text-lg flex-shrink-0"
                    style={{background:`${item.color}22`, color:item.color, border:`1px solid ${item.color}44`}}>
                    {item.grade}
                  </div>
                  <div>
                    <p className="font-bold text-sm text-gray-200">{item.label}</p>
                    <p className="text-xs text-gray-500 mt-0.5">{item.desc}</p>
                  </div>
                </div>
              ))}
            </div>
          </div>
        )}

        {/* Quotes */}
        {activeTab === 'quotes' && (
          <div className="animate-fade-in">
            <QuoteCarousel />
            <div className="mt-6 grid gap-4">
              {QUOTES.map((q, i) => (
                <div key={i} className="knov-card rounded-xl p-5">
                  <p className="text-gray-200 text-sm leading-relaxed font-jp">{q.ja}</p>
                </div>
              ))}
            </div>
          </div>
        )}
      </div>

      {/* Footer */}
      <footer className="relative z-10 text-center py-10 border-t" style={{borderColor:'rgba(255,255,255,0.05)'}}>
        <p className="text-2xl mb-2">◇ ◆ □ ■</p>
        <p className="text-xs text-gray-700">HUNTER × HUNTER © Yoshihiro Togashi / Shueisha</p>
        <p className="text-xs text-gray-800 mt-1">Fan-made tribute page</p>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
