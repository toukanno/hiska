<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>コムギ — 軍儀世界チャンピオン</title>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          chara: { primary: '#ca8a04', accent: '#fde68a', dark: '#0a0a0a', card: '#141414' },
        },
        fontFamily: { jp: ['"Noto Serif JP"', 'serif'] },
        animation: {
          'fade-in': 'fadeIn 0.8s ease forwards',
          'float': 'float 3s ease-in-out infinite',
        },
        keyframes: {
          fadeIn: { from: { opacity: 0 }, to: { opacity: 1 } },
          float: { '0%,100%': { transform: 'translateY(0)' }, '50%': { transform: 'translateY(-10px)' } },
        },
      }
    }
  }
</script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;700;900&display=swap" rel="stylesheet">
<style>
  body { background-color: #0a0a0a; }
  .gradient-text {
    background: linear-gradient(135deg, #fde68a, #ca8a04, #fde68a);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    background-size: 200% auto; animation: shimmer 3s linear infinite;
  }
  @keyframes shimmer { to { background-position: 200% center; } }
  .chara-card {
    background: linear-gradient(145deg, #1a1a1a, #141414);
    border: 1px solid #ca8a0433; transition: all 0.3s ease;
  }
  .chara-card:hover {
    border-color: #ca8a0499; transform: translateY(-4px);
    box-shadow: 0 10px 40px #ca8a0433;
  }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: #0a0a0a; }
  ::-webkit-scrollbar-thumb { background: #ca8a04; border-radius: 2px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState } = React;

const QUOTES = [
  { ja: "メルエム様、ワダす…今…とっても幸せです。", en: "Meruem-sama, I'm... right now... so very happy." },
  { ja: "ワダすはきっとこの日のために生まれてきますた…！", en: "I'm sure I was born for this day...!" },
  { ja: "ワダすは負けたら　ゴミなんです", en: "If I lose, I'm garbage." },
  { ja: "おやすみなさい…メルエム…", en: "Good night... Meruem..." },
  { ja: "命です", en: "My life." },
];

const PROFILE = [
  { label: "本名", value: "コムギ" },
  { label: "職業", value: "軍儀世界チャンピオン" },
  { label: "特徴", value: "盲目" },
  { label: "関係", value: "メルエムの軍儀の相手" },
  { label: "状態", value: "死亡" },
];

function QuoteCarousel() {
  const [idx, setIdx] = useState(0);
  const [visible, setVisible] = useState(true);
  const next = () => { setVisible(false); setTimeout(() => { setIdx(i => (i+1) % QUOTES.length); setVisible(true); }, 300); };
  const prev = () => { setVisible(false); setTimeout(() => { setIdx(i => (i-1+QUOTES.length) % QUOTES.length); setVisible(true); }, 300); };
  return (
    <div className="chara-card rounded-2xl p-8 text-center relative overflow-hidden">
      <div className="absolute top-4 left-6 text-6xl opacity-10 font-serif" style={{color:'#ca8a04'}}>"</div>
      <div className="transition-opacity duration-300 relative z-10" style={{opacity: visible ? 1 : 0}}>
        <p className="text-lg leading-relaxed text-gray-100 font-jp mb-4">{QUOTES[idx].ja}</p>
        <p className="text-sm text-gray-500 italic">{QUOTES[idx].en}</p>
      </div>
      <div className="flex justify-center gap-4 mt-6">
        <button onClick={prev} className="w-10 h-10 rounded-full border text-gray-400 hover:bg-white/5 transition-all flex items-center justify-center" style={{borderColor:'#ca8a0488'}}>‹</button>
        <div className="flex gap-1 items-center">
          {QUOTES.map((_,i) => (<button key={i} onClick={() => setIdx(i)} className={`w-2 h-2 rounded-full transition-all ${i===idx ? 'w-4' : ''}`} style={{background: i===idx ? '#ca8a04' : '#444'}} />))}
        </div>
        <button onClick={next} className="w-10 h-10 rounded-full border text-gray-400 hover:bg-white/5 transition-all flex items-center justify-center" style={{borderColor:'#ca8a0488'}}>›</button>
      </div>
    </div>
  );
}

function App() {
  const [tab, setTab] = useState('profile');
  return (
    <div className="min-h-screen text-white font-jp" style={{background:'#0a0a0a'}}>
      <div className="max-w-4xl mx-auto px-6 pt-4">
        <a href="/" className="text-sm text-gray-500 hover:text-gray-300 transition-colors">← トップページへ戻る</a>
      </div>
      <div className="overflow-hidden" style={{background:'linear-gradient(180deg, #ca8a0418 0%, #0a0a0a 100%)'}}>
        <div className="max-w-4xl mx-auto px-6 py-20 text-center">
          <div className="inline-block mb-6 px-4 py-1 rounded-full border text-xs tracking-widest" style={{borderColor:'#ca8a0444', color:'#fde68a', background:'#ca8a040d'}}>
            軍儀世界チャンピオン
          </div>
          <h1 className="text-6xl md:text-8xl font-black mb-4 leading-none tracking-tight">
            <span className="gradient-text">KOMUGI</span>
          </h1>
          <p className="text-2xl text-gray-400 mb-2 font-light tracking-widest">コムギ</p>
          <div className="flex justify-center gap-3 mt-8 flex-wrap">
            {
            <span className="px-3 py-1 rounded-full text-xs border" style={{borderColor:'#ca8a0466', color:'#fde68a', background:'#ca8a0411'}}>軍儀</span>
            <span className="px-3 py-1 rounded-full text-xs border" style={{borderColor:'#ca8a0466', color:'#fde68a', background:'#ca8a0411'}}>盲目</span>
            <span className="px-3 py-1 rounded-full text-xs border" style={{borderColor:'#ca8a0466', color:'#fde68a', background:'#ca8a0411'}}>世界王者</span>}
          </div>
        </div>
      </div>

      <div className="sticky top-0 z-20" style={{background:'rgba(10,10,10,0.95)', backdropFilter:'blur(12px)', borderBottom:'1px solid rgba(255,255,255,0.06)'}}>
        <div className="max-w-4xl mx-auto px-6 flex gap-0 overflow-x-auto">
          {['profile','quotes'].map(t => (
            <button key={t} onClick={() => setTab(t)}
              className={`px-5 py-4 text-sm font-bold whitespace-nowrap transition-all border-b-2 ${
                tab === t ? 'text-gray-100' : 'border-transparent text-gray-500 hover:text-gray-300'
              }`} style={{borderColor: tab === t ? '#ca8a04' : 'transparent'}}>
              {t === 'profile' ? 'プロフィール' : '名言'}
            </button>
          ))}
        </div>
      </div>

      <div className="max-w-4xl mx-auto px-6 py-12">
        {tab === 'profile' && (
          <div className="animate-fade-in grid md:grid-cols-2 gap-6">
            <div className="chara-card rounded-2xl p-6">
              <h2 className="text-lg font-bold mb-6" style={{color:'#fde68a'}}>基本プロフィール</h2>
              <div className="space-y-3">
                {PROFILE.map(({label, value}) => (
                  <div key={label} className="flex justify-between items-center py-2" style={{borderBottom:'1px solid rgba(255,255,255,0.05)'}}>
                    <span className="text-xs text-gray-500 tracking-wider">{label}</span>
                    <span className="text-sm text-gray-200 font-medium">{value}</span>
                  </div>
                ))}
              </div>
            </div>
            <div className="chara-card rounded-2xl p-6">
              <h2 className="text-lg font-bold mb-4" style={{color:'#fde68a'}}>キャラクター概要</h2>
              <p className="text-sm text-gray-400 leading-relaxed">東ゴルトー共和国出身の盲目の少女。軍儀（ボードゲーム）の世界チャンピオン。メルエムとの軍儀対局を通じて互いに特別な存在となった。最期はメルエムの隣で静かに眠りについた。</p>
            </div>
          </div>
        )}
        {tab === 'quotes' && (
          <div className="animate-fade-in">
            <QuoteCarousel />
            <div className="mt-6 grid gap-4">
              {QUOTES.map((q, i) => (
                <div key={i} className="chara-card rounded-xl p-5">
                  <p className="text-gray-200 text-sm leading-relaxed font-jp">{q.ja}</p>
                </div>
              ))}
            </div>
          </div>
        )}
      </div>

      <footer className="text-center py-10 border-t" style={{borderColor:'rgba(255,255,255,0.05)'}}>
        <p className="text-xs text-gray-700">HUNTER × HUNTER © Yoshihiro Togashi / Shueisha</p>
        <p className="text-xs text-gray-800 mt-1">Fan-made tribute page</p>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
