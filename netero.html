<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>アイザック＝ネテロ — ハンター協会会長</title>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          chara: { primary: '#b45309', accent: '#fcd34d', dark: '#0a0a0a', card: '#141414' },
        },
        fontFamily: { jp: ['"Noto Serif JP"', 'serif'] },
        animation: {
          'fade-in': 'fadeIn 0.8s ease forwards',
          'float': 'float 3s ease-in-out infinite',
        },
        keyframes: {
          fadeIn: { from: { opacity: 0 }, to: { opacity: 1 } },
          float: { '0%,100%': { transform: 'translateY(0)' }, '50%': { transform: 'translateY(-10px)' } },
        },
      }
    }
  }
</script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;700;900&display=swap" rel="stylesheet">
<style>
  body { background-color: #0a0a0a; }
  .gradient-text {
    background: linear-gradient(135deg, #fcd34d, #b45309, #fcd34d);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    background-size: 200% auto; animation: shimmer 3s linear infinite;
  }
  @keyframes shimmer { to { background-position: 200% center; } }
  .chara-card {
    background: linear-gradient(145deg, #1a1a1a, #141414);
    border: 1px solid #b4530933; transition: all 0.3s ease;
  }
  .chara-card:hover {
    border-color: #b4530999; transform: translateY(-4px);
    box-shadow: 0 10px 40px #b4530933;
  }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: #0a0a0a; }
  ::-webkit-scrollbar-thumb { background: #b45309; border-radius: 2px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState } = React;

const QUOTES = [
  { ja: "蟻の王メルエム。お前さんは何もわかっちゃいねぇよ…人間の底すら無い悪意を…！！", en: "King of Ants, Meruem. You don't understand a thing... about humanity's bottomless malice!!" },
  { ja: "挑戦を止めた時が人生の終わる時。", en: "The moment you stop challenging yourself is when your life ends." },
  { ja: "祈りとは心の所作　心が正しく形を成せば想いとなり　想いこそが実を結ぶのだ", en: "Prayer is an act of the heart. When the heart takes its proper form, it becomes will — and will bears fruit." },
  { ja: "この年で挑戦者か　血沸く血沸く♪", en: "A challenger at my age? How thrilling!" },
  { ja: "俺は一人じゃねェ・・・　人間を舐めるなよ メルエム・・・!!", en: "I'm not alone... Don't underestimate humans, Meruem!!" },
];

const PROFILE = [
  { label: "本名", value: "アイザック＝ネテロ" },
  { label: "年齢", value: "120歳以上" },
  { label: "念の系統", value: "強化系" },
  { label: "職業", value: "ハンター協会第12代会長" },
  { label: "必殺技", value: "百式観音" },
  { label: "状態", value: "死亡" },
];

function QuoteCarousel() {
  const [idx, setIdx] = useState(0);
  const [visible, setVisible] = useState(true);
  const next = () => { setVisible(false); setTimeout(() => { setIdx(i => (i+1) % QUOTES.length); setVisible(true); }, 300); };
  const prev = () => { setVisible(false); setTimeout(() => { setIdx(i => (i-1+QUOTES.length) % QUOTES.length); setVisible(true); }, 300); };
  return (
    <div className="chara-card rounded-2xl p-8 text-center relative overflow-hidden">
      <div className="absolute top-4 left-6 text-6xl opacity-10 font-serif" style={{color:'#b45309'}}>"</div>
      <div className="transition-opacity duration-300 relative z-10" style={{opacity: visible ? 1 : 0}}>
        <p className="text-lg leading-relaxed text-gray-100 font-jp mb-4">{QUOTES[idx].ja}</p>
        <p className="text-sm text-gray-500 italic">{QUOTES[idx].en}</p>
      </div>
      <div className="flex justify-center gap-4 mt-6">
        <button onClick={prev} className="w-10 h-10 rounded-full border text-gray-400 hover:bg-white/5 transition-all flex items-center justify-center" style={{borderColor:'#b4530988'}}>‹</button>
        <div className="flex gap-1 items-center">
          {QUOTES.map((_,i) => (<button key={i} onClick={() => setIdx(i)} className={`w-2 h-2 rounded-full transition-all ${i===idx ? 'w-4' : ''}`} style={{background: i===idx ? '#b45309' : '#444'}} />))}
        </div>
        <button onClick={next} className="w-10 h-10 rounded-full border text-gray-400 hover:bg-white/5 transition-all flex items-center justify-center" style={{borderColor:'#b4530988'}}>›</button>
      </div>
    </div>
  );
}

function App() {
  const [tab, setTab] = useState('profile');
  return (
    <div className="min-h-screen text-white font-jp" style={{background:'#0a0a0a'}}>
      <div className="max-w-4xl mx-auto px-6 pt-4">
        <a href="/" className="text-sm text-gray-500 hover:text-gray-300 transition-colors">← トップページへ戻る</a>
      </div>
      <div className="overflow-hidden" style={{background:'linear-gradient(180deg, #b4530918 0%, #0a0a0a 100%)'}}>
        <div className="max-w-4xl mx-auto px-6 py-20 text-center">
          <div className="inline-block mb-6 px-4 py-1 rounded-full border text-xs tracking-widest" style={{borderColor:'#b4530944', color:'#fcd34d', background:'#b453090d'}}>
            ハンター協会会長
          </div>
          <h1 className="text-6xl md:text-8xl font-black mb-4 leading-none tracking-tight">
            <span className="gradient-text">ISAAC NETERO</span>
          </h1>
          <p className="text-2xl text-gray-400 mb-2 font-light tracking-widest">ネテロ</p>
          <div className="flex justify-center gap-3 mt-8 flex-wrap">
            {
            <span className="px-3 py-1 rounded-full text-xs border" style={{borderColor:'#b4530966', color:'#fcd34d', background:'#b4530911'}}>強化系</span>
            <span className="px-3 py-1 rounded-full text-xs border" style={{borderColor:'#b4530966', color:'#fcd34d', background:'#b4530911'}}>会長</span>
            <span className="px-3 py-1 rounded-full text-xs border" style={{borderColor:'#b4530966', color:'#fcd34d', background:'#b4530911'}}>人類最強</span>}
          </div>
        </div>
      </div>

      <div className="sticky top-0 z-20" style={{background:'rgba(10,10,10,0.95)', backdropFilter:'blur(12px)', borderBottom:'1px solid rgba(255,255,255,0.06)'}}>
        <div className="max-w-4xl mx-auto px-6 flex gap-0 overflow-x-auto">
          {['profile','quotes'].map(t => (
            <button key={t} onClick={() => setTab(t)}
              className={`px-5 py-4 text-sm font-bold whitespace-nowrap transition-all border-b-2 ${
                tab === t ? 'text-gray-100' : 'border-transparent text-gray-500 hover:text-gray-300'
              }`} style={{borderColor: tab === t ? '#b45309' : 'transparent'}}>
              {t === 'profile' ? 'プロフィール' : '名言'}
            </button>
          ))}
        </div>
      </div>

      <div className="max-w-4xl mx-auto px-6 py-12">
        {tab === 'profile' && (
          <div className="animate-fade-in grid md:grid-cols-2 gap-6">
            <div className="chara-card rounded-2xl p-6">
              <h2 className="text-lg font-bold mb-6" style={{color:'#fcd34d'}}>基本プロフィール</h2>
              <div className="space-y-3">
                {PROFILE.map(({label, value}) => (
                  <div key={label} className="flex justify-between items-center py-2" style={{borderBottom:'1px solid rgba(255,255,255,0.05)'}}>
                    <span className="text-xs text-gray-500 tracking-wider">{label}</span>
                    <span className="text-sm text-gray-200 font-medium">{value}</span>
                  </div>
                ))}
              </div>
            </div>
            <div className="chara-card rounded-2xl p-6">
              <h2 className="text-lg font-bold mb-4" style={{color:'#fcd34d'}}>キャラクター概要</h2>
              <p className="text-sm text-gray-400 leading-relaxed">ハンター協会第12代会長。半世紀以上前に「人類最強の念能力者」と呼ばれた伝説の武闘家。山で一万回以上の正拳突きを繰り返し百式観音を会得した。メルエムとの最終決戦で自らの命と引き換えに薔薇を起動。</p>
            </div>
          </div>
        )}
        {tab === 'quotes' && (
          <div className="animate-fade-in">
            <QuoteCarousel />
            <div className="mt-6 grid gap-4">
              {QUOTES.map((q, i) => (
                <div key={i} className="chara-card rounded-xl p-5">
                  <p className="text-gray-200 text-sm leading-relaxed font-jp">{q.ja}</p>
                </div>
              ))}
            </div>
          </div>
        )}
      </div>

      <footer className="text-center py-10 border-t" style={{borderColor:'rgba(255,255,255,0.05)'}}>
        <p className="text-xs text-gray-700">HUNTER × HUNTER © Yoshihiro Togashi / Shueisha</p>
        <p className="text-xs text-gray-800 mt-1">Fan-made tribute page</p>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
